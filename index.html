<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punch In Application</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#1f2937,#111827);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  background:#1f2937;
  padding:40px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  text-align:center;
  width:320px;
}

h1{
  margin-bottom:20px;
  font-size:26px;
}

.time{
  font-size:18px;
  margin-bottom:25px;
  color:#9ca3af;
}

button{
  background:#2563eb;
  border:none;
  color:white;
  padding:12px 25px;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1d4ed8;
}

.footer{
  margin-top:25px;
  font-size:12px;
  color:#9ca3af;
}
</style>

</head>

<body>

<div class="container">

<h1> Punch In System </h1>

<div class="time" id="currentTime"></div>

<button onclick="punch()">Punch In</button>

<div class="footer">
Cloud Punch Tracking App
</div>

</div>

<script>

function updateClock(){
  const now = new Date()
  document.getElementById("currentTime").innerText =
    "Current Time: " + now.toLocaleString()
}

setInterval(updateClock,1000)
updateClock()

async function punch(){

  const time = new Date().toLocaleString()

  await fetch("/punchin",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({time})
  })

  alert("Punch saved successfully")
}

</script>

</body>
</html>
