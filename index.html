<!DOCTYPE html>
<html>
<head>
<title>Punch In App</title>
</head>

<body>

<h1>Punch In</h1>

<button onclick="punch()">Punch In</button>

<script>
async function punch(){
  const time = new Date().toLocaleString()

  await fetch("/punchin",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({time})
  })

  alert("Punch saved")
}
</script>

</body>
</html>
